<body><main>
  <h1>Capabilities, defined</h1>
  <p>An <abbr title="object capability">ocap</abbr> is a secure token of authority.
  We record each privileged effect with <dfn>provenance</dfn>: a signed, checked trail.</p>
  <dl>
    <dt>frobnicator</dt><dd>the component that runs the job.</dd>
  </dl>
  <p>The frobnicator reads the ocap and writes the provenance.</p>
</main></body></html>
