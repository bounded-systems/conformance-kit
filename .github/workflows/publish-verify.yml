name: publish-verify

# Publishes @bounded-systems/verify (integrity/verify) to JSR, keyless via
# GitHub Actions OIDC — no long-lived tokens. Cut a release by pushing a tag:
#
#   git tag verify-v0.1.0 && git push origin verify-v0.1.0
#
# or run this workflow manually (workflow_dispatch). The published version is
# whatever integrity/verify/deno.json declares — bump it before tagging.

on:
  push:
    tags: ["verify-v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for JSR OIDC keyless auth

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: integrity/verify
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v2.x
      - name: Dry-run gate (type-check + manifest)
        run: deno publish --dry-run --allow-slow-types
      - name: Publish to JSR
        run: deno publish --allow-slow-types
