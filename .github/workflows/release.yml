name: release

# Release provenance via the bounded-systems mint capability. On a v<version> tag
# (cut by `mint release`), emits the deterministic in-toto release Statement
# (tag → version plan → commit), keyless-signs it (cosign/OIDC — no key material),
# and attaches it to the GitHub release. The npm registry publish stays in
# publish.yml; this job owns VERSION + TAG provenance only.
# Pinned to an immutable mint commit SHA; bump when mint cuts its first tag.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # create / upload to the GitHub release
  id-token: write   # OIDC — cosign keyless signing

jobs:
  release:
    uses: bounded-systems/mint/.github/workflows/release-provenance.yml@2fd8203c4054e626e99a19e888d91f507449b91e # mint main
    with:
      ref: 2fd8203c4054e626e99a19e888d91f507449b91e
