name: publish

# Publishes @bounded-systems/conformance-kit to npm with build provenance, via npm
# Trusted Publishing (OIDC) — no stored NPM_TOKEN, no 2FA.
#
# Release flow: bump the version on `main`, fast-forward `main` into the `publish`
# branch, and push — CI publishes whatever version is in package.json. (A `v*` tag
# push, or a manual dispatch, releases too.) The publish step is IDEMPOTENT: if that
# version is already on npm it is SKIPPED, so re-pushing `publish` without a version
# bump is a clean no-op, never a red build.
on:
  push:
    branches: [publish]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # OIDC — npm provenance + trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    # Gates the release through a GitHub environment; npm's Trusted Publisher must
    # name this same environment ("release") so the OIDC environment claim matches.
    # Add protection rules (required reviewers, etc.) to the environment as desired.
    environment: release
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Upgrade npm (OIDC Trusted Publishing needs npm >= 11.5.1)
        run: npm install -g npm@latest
      - name: Install deps
        run: npm ci --no-audit --no-fund
      - name: Test gate (must pass before publish)
        run: npm test
      - name: Is this version already on npm? (idempotency)
        id: published
        run: |
          name=$(node -p "require('./package.json').name")
          version=$(node -p "require('./package.json').version")
          if npm view "$name@$version" version >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::$name@$version is already published — skipping (no-op)."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "::notice::$name@$version is new — publishing."
          fi
      - name: Publish to npm (provenance, OIDC)
        if: steps.published.outputs.skip == 'false'
        run: npm publish --provenance --access public
